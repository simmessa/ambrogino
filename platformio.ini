; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:usb]
board = nodemcuv2
framework = arduino
platform = espressif8266
upload_port = /dev/ttyUSB0
monitor_port = /dev/ttyUSB0
monitor_speed = 115200
lib_deps = 
	knolleary/PubSubClient@^2.8
	mcxiaoke/ESPDateTime@^1.0.4

[env:ota]
board = nodemcuv2
framework = arduino
platform = espressif8266
upload_protocol = espota
upload_port = 192.168.1.181
; upload_flags with OTA password goes in platformio_local.ini (gitignored)
monitor_port = socket://192.168.1.181:8266
monitor_speed = 115200
lib_deps = 
	knolleary/PubSubClient@^2.8
	mcxiaoke/ESPDateTime@^1.0.4
	jandrassy/TelnetStream@^1.3.0

[platformio]
description = ESP8266 Arduino mqtt for irrigation
extra_configs = platformio_local.ini
